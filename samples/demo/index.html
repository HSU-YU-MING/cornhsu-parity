<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Parity Demo — 刻意做壞的實作</title>
<style>
  /* 這頁刻意跟 design.json 有落差,用來驗證 Parity 抓得出精確數值:
     - h1 字級 30(設計 32)、字型不是 Arial(軟落差)
     - cta-button 背景 #3B82F6(設計 #2563EB)、左右內距 8(設計 20)
     - feature-list gap 16(設計 24)
     - 設計裡的 hero-badge 這頁沒做 → 未配對 */
  * { box-sizing: border-box; margin: 0; }
  body { width: 800px; padding: 40px; font-family: Arial, sans-serif; background: #FFFFFF; }
  h1.page-title {
    font-family: "Segoe UI", sans-serif;   /* 設計是 Arial → 軟落差 */
    font-size: 30px;                        /* 設計 32 → 落差 */
    font-weight: 700;
    color: #111827;
    margin-bottom: 16px;
  }
  p.subtitle { font-size: 16px; color: #6B7280; margin-bottom: 32px; }
  button.cta {
    display: block;
    width: 160px; height: 48px;
    padding: 12px 8px;                      /* 設計 12px 20px → 左右內距落差 */
    background: #3B82F6;                    /* 設計 #2563EB → 色差 */
    color: #FFFFFF;
    border: none; border-radius: 8px;
    font-size: 16px; font-weight: 600; font-family: Arial, sans-serif;
    margin-bottom: 40px;
  }
  section.feature-list {
    display: flex;
    gap: 16px;                              /* 設計 itemSpacing 24 → 落差 */
    width: 720px;
  }
  .feature-card {
    width: 224px; height: 120px;
    padding: 16px;
    background: #F3F4F6;
    border-radius: 12px;
  }
  .feature-card h3 { font-size: 18px; font-weight: 600; color: #111827; }
</style>
</head>
<body>
  <h1 class="page-title">Parity Demo</h1>
  <p class="subtitle">數值級設計還原度檢查</p>
  <button class="cta" data-parity="cta-button"><span>Get Started</span></button>
  <section class="feature-list">
    <div class="feature-card" id="feature-card-1"><h3>數值級比對</h3></div>
    <div class="feature-card" id="feature-card-2"><h3>本機優先</h3></div>
    <div class="feature-card" id="feature-card-3"><h3>進 CI 把關</h3></div>
  </section>
  <!-- 設計稿的 hero-badge 沒刻 → 應誠實出現在未配對清單 -->
</body>
</html>
